name: CI devops 2025

on:
  # Launch pipeline on push to main and develop branches
  push:
    branches:
      - main
      - develop
  # Also run on pull requests targeting any branch
  pull_request:
  # Allow manual trigger for deployment
  workflow_dispatch:

jobs:
  # -------------------------------------------------------
  # JOB 1 : Build and test the backend application
  # -------------------------------------------------------
  test-backend:
    runs-on: ubuntu-24.04
    steps:
      # Checkout the repository source code
      - uses: actions/checkout@v4

      # Set up JDK 21 (temurin distribution, same as our Docker image)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Build the project and run all unit + integration tests via Maven
      # Testcontainers will spin up a PostgreSQL container automatically during integration tests
      # SonarCloud analysis is run at the same time to report code quality
      - name: Build and test with Maven
        run: mvn -B verify sonar:sonar
          -Dsonar.projectKey=mohamedlaidi_TP_01_DEVOPS
          -Dsonar.organization=mohamedlaidi
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}
          --file ./backend/simple-api/pom.xml

  # -------------------------------------------------------
  # JOB 2 : Build Docker images and push to Docker Hub
  # Only runs if test-backend passes
  # -------------------------------------------------------
  build-and-push-docker-image:
    needs: test-backend
    # Run only when code is compiling and tests are passing
    runs-on: ubuntu-24.04

    steps:
      # Checkout the repository source code
      - name: Checkout code
        uses: actions/checkout@v4

      # Authenticate to Docker Hub using secured secrets
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      # Build and push the backend (Spring Boot API) image
      # push is conditioned on being on the main branch
      - name: Build image and push backend
        uses: docker/build-push-action@v6
        with:
          # Path to the directory containing the backend Dockerfile
          context: ./backend
          # Note: tags must be all lower-case
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-simple-api:latest
          # Only push to Docker Hub when committing on main branch
          push: ${{ github.ref == 'refs/heads/main' }}

      # Build and push the database (PostgreSQL) image
      - name: Build image and push database
        uses: docker/build-push-action@v6
        with:
          context: ./database
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:latest
          push: ${{ github.ref == 'refs/heads/main' }}

      # Build and push the HTTP server (Apache httpd) image
      - name: Build image and push httpd
        uses: docker/build-push-action@v6
        with:
          context: ./httpd
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-httpd:latest
          push: ${{ github.ref == 'refs/heads/main' }}

      # Build and push the frontend (Vue.js) image
      - name: Build image and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-frontend:latest
          push: ${{ github.ref == 'refs/heads/main' }}

  # -------------------------------------------------------
  # JOB 3 : Deploy application on server via Ansible
  # Only runs manually via workflow_dispatch
  # -------------------------------------------------------
  deploy:
    needs: build-and-push-docker-image
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 400 ~/.ssh/id_rsa
          ssh-keyscan -H mohamed-abdelaziz-el-abbes.laidi.takima.school >> ~/.ssh/known_hosts

      - name: Run Ansible playbook
        run: ansible-playbook -i ansible/inventories/setup.yml ansible/playbook.yml
